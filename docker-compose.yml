version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: crm-mongodb
    restart: always
    volumes:
      - crm_mongodb_data:/data/db
    networks:
      - crm-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/majisa_whatsapp_crm
      - JWT_SECRET=your_super_secret_key_change_me_in_prod
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=*
      - SESSION_PATH=./sessions
    volumes:
      - crm_whatsapp_sessions:/app/sessions
      - crm_uploads_data:/app/uploads
    depends_on:
      - db
    networks:
      - crm-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: crm-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  crm_mongodb_data:
  crm_whatsapp_sessions:
  crm_uploads_data:
